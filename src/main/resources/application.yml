spring:
  application:
    name: s3-to-hdfs-duckdb

kafka:
  bootstrap-servers: localhost:9092
  group-id: s3-to-hdfs-consumer
  topic-pattern: "etl.*"

s3:
  endpoint: http://localhost:4566
  region: us-east-1
  access-key: test
  secret-key: test
  path-style-access: true

duckdb:
  maximum-object-size: 2147483648  # 2 GB
  properties:
    memory_limit: "16GB"
    temp_directory: /tmp/duckdb_tmp
    threads: "4"
    extension_directory: extensions

hdfs:
  namenode: hdfs://localhost:8020
  output-base-path: /data
  flink-output-path: hdfs://localhost:8020/flink/output
  size-threshold-mb: 128        # compact when accumulated Parquet files reach this size
  compact-on-checkpoint: 2      # also compact every N checkpoints

flink:
  checkpoint-interval-ms: 60000  # checkpoint every 60 seconds
  parallelism: 4

logging:
  config: classpath:log4j2.xml

