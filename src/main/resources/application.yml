spring:
  application:
    name: s3-to-hdfs-duckdb

kafka:
  bootstrap-servers: localhost:9092
  group-id: s3-to-hdfs-consumer
  topic: etl.ecommerce.orders
  concurrency: 1

s3:
  endpoint: http://localhost:4566
  region: us-east-1
  access-key: test
  secret-key: test
  path-style-access: true

duckdb:
  maximum-object-size: 2147483648  # 2 GB
  properties:
    memory_limit: "16GB"
    temp_directory: /tmp/duckdb_tmp
    threads: "4"
    extension_directory: extensions

hdfs:
  namenode: hdfs://localhost:8020
  output-base-path: /data

batch:
  max-parquet-bytes: 134217728  # 128 MB — flush when buffered Parquet files reach this size
  flush-interval-ms: 60000     # 5 minutes — flush regardless of size

logging:
  config: classpath:log4j2.xml

